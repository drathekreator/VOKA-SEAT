# =====================================================================
# VOKA-SEAT — Mosquitto broker config (MVP scope)
#
# Two listeners:
#   1883 — default MQTT (TCP), used by the backend container over the
#          private voka_seat_net bridge network. Not published on the host.
#   9001 — MQTT over WebSockets, published as host 9002 → container 9001
#          (avoids the existing 9001:9001 binding on this host).
#
# allow_anonymous is true for MVP convenience.
# Production hardening checklist:
#   - Set `allow_anonymous false`
#   - Add `password_file /mosquitto/config/passwd`
#   - Add `acl_file /mosquitto/config/acl` restricting publish to
#     `vokafe/iot/telemetry` for ESP32 nodes only.
#   - Front the WebSocket listener with the host-side nginx TLS proxy
#     so credentials never travel in plaintext.
# =====================================================================

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# --- Listener 1: native MQTT ----------------------------------------
listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

# --- Listener 2: MQTT over WebSockets -------------------------------
listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
