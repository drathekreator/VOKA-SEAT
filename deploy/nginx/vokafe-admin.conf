# vim: set ft=nginx:
# =====================================================================
# VOKA-SEAT — Admin subdomain
# Drop ke /etc/nginx/sites-available/vokafe-admin lalu symlink.
#
# Upstream:
#   127.0.0.1:8090 → frontend container (sama dengan customer subdomain)
#   127.0.0.1:3100 → backend container
#
# Frontend bundle deteksi hostname dan otomatis mount AdminAppShell
# untuk vokafe-admin.duckdns.org.
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name vokafe-admin.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vokafe-admin.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/vokafe-admin.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vokafe-admin.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;

    client_max_body_size 8m;

    access_log /var/log/nginx/vokafe-admin.access.log;
    error_log  /var/log/nginx/vokafe-admin.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_cache_bypass                 $http_upgrade;
        proxy_read_timeout 3600s;
    }
}
