<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

                        "DEFAULT": "0.25rem",

                    },
                    "spacing": {
                        "md": "16px",
                        "xs": "4px",

<style>
        .shadow-ambient-lg {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        .shadow-magenta-glow {
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2);
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-margin-mobile md:p-margin-tablet antialiased">
<!-- Register Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-ambient-lg p-lg md:p-xl flex flex-col gap-lg">
<!-- Logo Header -->
<header class="flex flex-col items-center gap-sm mb-sm text-center">
<img alt="Vokafe Logo" class="h-12 w-auto object-contain mb-xs" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqdFNTwhFnroSDAE7u1BU49ArBjvEzewkJqUKg13k3A1uYmdWiYkVEYfDFI8U5GSN6oZNUUo1IIatWJ7ua4GXoQ48jBEe5j48bBDpMMulRBCj4qUipqb14knqvdJlsmWXRxhEMBkZM6tHEyRwgH1xx8eDHZygABWpO2eKC90bZp-G4U5KvGS1vHH8ez8gRfzImTlY9pY3qw7UInSco2C6ISefKGiITY6B6sJvObtXQjIaSlIUEZ2VAClxskjRPqGS9e0_WkhAYIRg"/>
<h1 class="font-headline-md text-headline-md text-primary">Create Account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Join Vokafe POS to manage your orders efficiently.</p>
</header>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-md" method="POST">
<!-- Full Name Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none">person</span>
<input class="w-full h-12 pl-12 pr-md rounded-lg bg-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md placeholder:text-on-surface-variant/40" id="fullName" name="fullName" placeholder="Jane Doe" required="" type="text"/>
</div>
</div>
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none">mail</span>
<input class="w-full h-12 pl-12 pr-md rounded-lg bg-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="jane@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none">lock</span>
<input class="w-full h-12 pl-12 pr-md rounded-lg bg-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-xs" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant/50 pointer-events-none">lock_reset</span>
<input class="w-full h-12 pl-12 pr-md rounded-lg bg-surface border border-outline-variant/30 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md placeholder:text-on-surface-variant/40" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="mt-sm w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg shadow-magenta-glow hover:bg-primary-container active:scale-95 transition-all duration-200 flex items-center justify-center gap-sm" type="submit">
<span>Register</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Login Link -->
<div class="text-center mt-xs">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-label-sm text-label-sm hover:underline transition-all" href="#">Login here</a>
</p>
</div>
</main>
</body></html>
