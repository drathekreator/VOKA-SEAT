<p class="font-label-md text-label-md text-primary mt-1">$5.50</p>
</div>
<div class="flex items-center bg-surface rounded-full ring-1 ring-surface-variant h-[36px] shrink-0">
<button aria-label="Decrease quantity" class="w-[36px] h-full flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-primary-container/10 rounded-l-full active:scale-95 transition-all">

</button>
<span class="font-label-md text-label-md text-on-surface w-[24px] text-center select-none">1</span>
<button aria-label="Increase quantity" class="w-[36px] h-full flex items-center justify-center text-on-surface-variant hover:text-primary hover:bg-primary-container/10 rounded-r-full active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</article>
<!-- Item 2 -->

<div class="flex-1 flex flex-col justify-center min-w-0">

<p class="font-label-md text-label-md text-primary mt-1">$3.50</p>

<div class="flex items-center bg-surface rounded-full ring-1 ring-surface-variant h-[36px] shrink-0">

</button>
</div>

<button class="w-full h-12 flex items-center justify-center gap-2 border border-dashed border-outline-variant rounded-xl text-primary font-label-md text-label-md hover:bg-primary-container/5 transition-colors mt-2">
<span class="material-symbols-outlined">add_circle</span>

<span class="material-symbols-outlined text-[12px] text-on-primary" style="font-variation-settings: 'FILL' 1;">check</span>

<span class="material-symbols-outlined text-primary text-[28px]">qr_code_scanner</span>
<span class="font-label-sm text-label-sm text-primary font-semibold">QRIS</span>
</button>
<!-- Unselected Method -->

<a class="font-label-md text-label-md text-on-surface-variant hover:text-primary transition-colors" href="#">Tables</a>
<a class="font-label-md text-label-md text-primary flex items-center gap-2 border-b-2 border-primary h-full px-2" href="#">
