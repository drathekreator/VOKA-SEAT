<body class="bg-background min-h-screen flex items-center justify-center p-margin-mobile">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg p-margin-tablet flex flex-col items-center">
<!-- Logo -->
<div class="mb-xl w-48 h-auto">
<img alt="Vokafe Logo" class="w-full h-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqdFNTwhFnroSDAE7u1BU49ArBjvEzewkJqUKg13k3A1uYmdWiYkVEYfDFI8U5GSN6oZNUUo1IIatWJ7ua4GXoQ48jBEe5j48bBDpMMulRBCj4qUipqb14knqvdJlsmWXRxhEMBkZM6tHEyRwgH1xx8eDHZygABWpO2eKC90bZp-G4U5KvGS1vHH8ez8gRfzImTlY9pY3qw7UInSco2C6ISefKGiITY6B6sJvObtXQjIaSlIUEZ2VAClxskjRPqGS9e0_WkhAYIRg"/>
</div>
<!-- Header Text -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm text-center w-full">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-lg text-center w-full">Please enter your details to sign in.</p>
<!-- Form -->
<form class="w-full space-y-md">
<!-- Email Input -->
<div class="w-full">
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-surface-variant">
<span aria-hidden="true" class="material-symbols-outlined text-lg">mail</span>
</span>
<input class="w-full h-12 pl-10 pr-sm py-sm rounded-lg border border-surface-variant bg-surface-bright text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="email" name="email" placeholder="barista@vokafe.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="w-full">
<div class="flex items-center justify-between mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-surface-variant">
<span aria-hidden="true" class="material-symbols-outlined text-lg">lock</span>
</span>
<input class="w-full h-12 pl-10 pr-sm py-sm rounded-lg border border-surface-variant bg-surface-bright text-on-surface font-body-md text-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-12 mt-lg bg-primary text-on-primary rounded-lg font-label-md text-label-md shadow-[0_4px_12px_rgba(184,0,53,0.15)] hover:bg-primary-container hover:shadow-[0_6px_16px_rgba(184,0,53,0.2)] transition-all flex items-center justify-center" type="submit">
                Login
            </button>
</form>
<!-- Sign Up Link -->
<p class="mt-lg font-body-sm text-body-sm text-on-surface-variant text-center w-full">
            Don't have an account? <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Sign Up</a>
</p>
</div>
</body></html>
